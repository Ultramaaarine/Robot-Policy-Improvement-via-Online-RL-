defaults:
- setup
- skill_setup
- override datamodule: autoencoder_offline_training
- _self_
 
#autoencoder:
 #_target_: sac_diffusion.models.Vision.autoencoder.ResNetAE
# z_dim: 128
 #pretrained: True 
 #encoder_trainable: False
training:
 val_every: 1
 num_epochs: 500
 sanity_every: 200
 image_log_every: 500
 save_every_epoch: 100

optimizer:
  _target_: torch.optim.AdamW
  lr: 3e-5
  betas: [0.95,0.999]
  eps: 1.0e-8
  weight_decay: 1.0e-6
model_save_dir: /home/${oc.env:USER}/SAC_Diffusion/models/autoencoder
